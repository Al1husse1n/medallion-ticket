</div>

<!-- Main Content -->
<main class="pt-20 pb-24 px-margin-mobile max-w-3xl mx-auto">
<header class="mb-lg">
<h2 class="font-headline-lg text-headline-lg text-on-background">Production Management</h2>
<p class="text-body-md text-on-surface-variant mt-xs">Simplified administrative list and entry system.</p>
</header>
<!-- CRUD List Section -->
<section class="space-y-md">
<div class="flex items-center justify-between mb-sm">
<h3 class="font-label-md text-secondary uppercase tracking-wider">Current Productions</h3>
<span id="production-count" class="text-label-sm px-2 py-0.5 bg-slate-100 text-on-secondary-container rounded-full border border-outline-variant">Loading...</span>
</div>
<div class="divide-y divide-outline-variant bg-white border border-outline-variant rounded-xl overflow-hidden shadow-sm" id="production-list">
  <div class="p-md text-on-surface-variant">Loading productions...</div>
</div>
</section>
<!-- CRUD Add Form Section -->
<section class="mt-xl">
<div class="bg-white p-md md:p-lg rounded-xl border border-outline-variant shadow-sm">
<h3 class="font-headline-sm text-on-surface mb-md">Add New Production</h3>
<form id="add-production-form" class="space-y-md">
<div>
<label class="block text-label-md text-on-surface-variant mb-1">Production Title</label>
<input id="production-name" class="w-full bg-white border border-outline-variant rounded-lg p-3 text-on-surface focus:border-primary focus:ring-1 focus:ring-primary outline-none transition-all" placeholder="Enter title..." type="text" required />
</div>
<div class="grid grid-cols-1 md:grid-cols-2 gap-md">
<div>
<label class="block text-label-md text-on-surface-variant mb-1">Genre</label>
<select id="production-type" class="w-full bg-white border border-outline-variant rounded-lg p-3 text-on-surface focus:border-primary focus:ring-1 focus:ring-primary outline-none transition-all" required>
<option value="Classic Tragedy">Classic Tragedy</option>
<option value="Musical Theater">Musical Theater</option>
<option value="Contemporary Dance">Contemporary Dance</option>
<option value="Opera">Opera</option>
<option value="Experimental">Experimental</option>
</select>
</div>
<div>
<label class="block text-label-md text-on-surface-variant mb-1">Status</label>
<select id="production-status" class="w-full bg-white border border-outline-variant rounded-lg p-3 text-on-surface focus:border-primary focus:ring-1 focus:ring-primary outline-none transition-all">
<option>Active</option>
<option>Rehearsal</option>
<option>Hiatus</option>
<option>Closed</option>
</select>
</div>
</div>
<div class="grid grid-cols-1 md:grid-cols-2 gap-md">
<div>
<label class="block text-label-md text-on-surface-variant mb-1">Opening Date</label>
<input id="production-opening" class="w-full bg-white border border-outline-variant rounded-lg p-3 text-on-surface focus:border-primary focus:ring-1 focus:ring-primary outline-none transition-all" type="date" />
</div>
<div>
<label class="block text-label-md text-on-surface-variant mb-1">Closing Date</label>
<input id="production-closing" class="w-full bg-white border border-outline-variant rounded-lg p-3 text-on-surface focus:border-primary focus:ring-1 focus:ring-primary outline-none transition-all" type="date" />
</div>
</div>
<div>
<label class="block text-label-md text-on-surface-variant mb-1">Production Summary</label>

<button class="w-full bg-primary text-on-primary font-label-md py-3.5 rounded-lg hover:bg-primary/90 transition-all active:scale-[0.99] flex items-center justify-center gap-2" type="submit">

<span class="text-[10px] font-medium">Patrons</span>
</a>

<script>
  document.addEventListener('DOMContentLoaded', () => {
    if (!authService.requireAuthorization(['manager', 'clerk'])) {
      return;
    }
    hideUnauthorizedLinks();
  });
</script>
<script>
  document.addEventListener('DOMContentLoaded', async () => {
    if (!authService.isAuthenticated()) {
      authService.logout();
      return;
    }

    const productionCount = document.getElementById('production-count');
    const productionList = document.getElementById('production-list');
    const addForm = document.getElementById('add-production-form');
    const nameInput = document.getElementById('production-name');
    const typeInput = document.getElementById('production-type');

    const renderProductions = (productions) => {
      if (!productions?.length) {
        productionList.innerHTML = '<div class="p-md text-on-surface-variant">No productions available.</div>';
        productionCount.textContent = '0 Shows';
        return;
      }
      productionCount.textContent = `${productions.length} Shows`;
      productionList.innerHTML = productions.map((production) => `
        <div class="p-md flex items-center justify-between hover:bg-slate-50 transition-colors">
          <div class="flex-grow">
            <div class="flex items-center gap-2">
              <h4 class="font-headline-sm text-on-surface">${production.name}</h4>
              <span class="text-[10px] font-bold px-1.5 py-0.5 bg-slate-100 text-slate-700 rounded uppercase">${production.type}</span>
            </div>
            <p class="text-body-sm text-on-surface-variant">ID ${production.id}</p>
          </div>
          <div class="flex items-center gap-1">
            <button type="button" data-edit-id="${production.id}" class="p-2 text-on-surface-variant hover:text-primary transition-colors">
              <span class="material-symbols-outlined text-[20px]">edit</span>
            </button>
            <button type="button" data-delete-id="${production.id}" class="p-2 text-on-surface-variant hover:text-error transition-colors">
              <span class="material-symbols-outlined text-[20px]">delete</span>
            </button>
          </div>
        </div>
      `).join('');
    };

    const loadProductions = async () => {
      const result = await productionService.getProductions();
      if (!result.success) {
        showToast(result.error || 'Unable to load productions', 'error');
        return;
      }
      renderProductions(result.data || []);
    };

    productionList.addEventListener('click', async (event) => {
      const deleteButton = event.target.closest('[data-delete-id]');
      const editButton = event.target.closest('[data-edit-id]');
      if (deleteButton) {
        const id = deleteButton.dataset.deleteId;
        if (!confirm('Delete this production?')) {
          return;
        }
        const result = await productionService.deleteProduction(id);
        if (!result.success) {
          showToast(result.error || 'Unable to delete production', 'error');
          return;
        }
        showToast('Production deleted successfully.', 'success');
        await loadProductions();
      }
      if (editButton) {
        showToast('Edit is not available yet. Backend update endpoint required.', 'info');
      }
    });

    addForm.addEventListener('submit', async (event) => {
      event.preventDefault();
      const name = nameInput.value.trim();
      const type = typeInput.value.trim();
      if (!name || !type) {
        showToast('Title and genre are required.', 'error');
        return;
      }
      const result = await productionService.registerProduction({ name, type });
      if (!result.success) {
        showToast(result.error || 'Unable to create production', 'error');
        return;
      }
      showToast('Production created successfully.', 'success');
      addForm.reset();
      await loadProductions();
    });

    await loadProductions();
  });
</script>
</body></html>
