<!DOCTYPE html>
<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Seat Inventory | Medallion Theater</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
  tailwind.config = {
    darkMode: "class",
    theme: {
      extend: {
        colors: {
          background: "#ffffff",
          surface: "#ffffff",
          "on-surface": "#0f172a",
          primary: "#003d9b",
          "on-primary": "#ffffff",
          "outline-variant": "#e2e8f0",
          "surface-variant": "#f1f5f9",
          "on-surface-variant": "#475569",
        },
        borderRadius: {
          DEFAULT: "0.125rem",
          lg: "0.25rem",
          xl: "0.5rem",
          full: "0.75rem",
        },
        spacing: {
          xl: "32px",
          gutter: "16px",
          "margin-desktop": "32px",
          xs: "4px",
          "margin-mobile": "16px",
          sm: "12px",
          base: "8px",
          lg: "24px",
          md: "16px",
        },
      },
    },
  };
</script>
<style>
  body { font-family: 'Inter', sans-serif; }
  .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
</style>
</head>
<body class="bg-background text-on-surface min-h-screen">
<header class="bg-white border-b border-outline-variant sticky top-0 z-40 px-margin-mobile md:px-margin-desktop py-base flex items-center justify-between">
  <div class="flex items-center gap-3">
    <span class="material-symbols-outlined text-primary text-3xl">event_seat</span>
    <div>
      <h1 class="text-headline-md font-semibold">Seat Inventory</h1>
      <p class="text-body-sm text-on-surface-variant">Browse seats and availability.</p>
    </div>
  </div>
  <div class="flex items-center gap-4">
    <a href="login.html" class="text-error font-label-md hover:underline">Logout</a>
  </div>
</header>
<main class="px-margin-mobile md:px-margin-desktop py-lg max-w-6xl mx-auto space-y-lg">
  <div class="flex flex-col md:flex-row items-start md:items-center justify-between gap-md">
    <div>
      <h2 class="font-headline-lg text-on-surface">Available Seats</h2>
      <p class="text-body-sm text-on-surface-variant">Seats are viewable by clerks and managers.</p>
    </div>
    <button data-role="manager" id="initialize-seats-button" class="hidden bg-primary text-on-primary px-lg py-sm rounded-lg font-label-md hover:bg-primary/90 transition-colors">Initialize Seats</button>
  </div>
  <div class="grid grid-cols-1 md:grid-cols-3 gap-md">
    <div class="bg-surface border border-outline-variant rounded-xl p-md shadow-sm">
      <p class="text-label-sm text-on-surface-variant uppercase tracking-wider">Total Seats</p>
      <p id="seat-count" class="text-headline-lg font-bold text-on-surface">0</p>
    </div>
    <div class="bg-surface border border-outline-variant rounded-xl p-md shadow-sm">
      <p class="text-label-sm text-on-surface-variant uppercase tracking-wider">Available Seats</p>
      <p id="available-seat-count" class="text-headline-lg font-bold text-on-surface">0</p>
    </div>
    <div class="bg-surface border border-outline-variant rounded-xl p-md shadow-sm">
      <p class="text-label-sm text-on-surface-variant uppercase tracking-wider">Loaded Seats</p>
      <p id="loaded-seat-count" class="text-headline-lg font-bold text-on-surface">0</p>
    </div>
  </div>
  <div class="bg-surface border border-outline-variant rounded-xl overflow-hidden shadow-sm">
    <div class="overflow-x-auto">
      <table class="w-full text-left border-collapse">
        <thead class="bg-surface-variant border-b border-outline-variant">
          <tr>
            <th class="px-lg py-md font-label-md text-on-surface-variant">Seat</th>
            <th class="px-lg py-md font-label-md text-on-surface-variant">Category</th>
            <th class="px-lg py-md font-label-md text-on-surface-variant">Status</th>
          </tr>
        </thead>
        <tbody id="seat-table-body" class="divide-y divide-outline-variant"></tbody>
      </table>
    </div>
  </div>
</main>
<nav class="md:hidden fixed bottom-0 w-full bg-white border-t border-outline-variant h-16 flex justify-around items-center px-4 z-50">
  <a data-role="manager" href="manager.html" class="flex flex-col items-center justify-center text-on-surface-variant hover:text-primary transition-colors">
    <span class="material-symbols-outlined">home</span>
    <span class="text-[10px] font-medium">Manager</span>
  </a>
  <a data-role="clerk" href="clerk.html" class="flex flex-col items-center justify-center text-on-surface-variant hover:text-primary transition-colors">
    <span class="material-symbols-outlined">dashboard</span>
    <span class="text-[10px] font-medium">Clerk</span>
  </a>
  <a data-role="manager,clerk" href="production_management.html" class="flex flex-col items-center justify-center text-on-surface-variant hover:text-primary transition-colors">
    <span class="material-symbols-outlined">theater_comedy</span>
    <span class="text-[10px] font-medium">Shows</span>
  </a>
  <a data-role="manager,clerk" href="seats.html" class="flex flex-col items-center justify-center text-primary">
    <span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">event_seat</span>
    <span class="text-[10px] font-medium">Seats</span>
  </a>
  <a data-role="manager,clerk" href="tickets.html" class="flex flex-col items-center justify-center text-on-surface-variant hover:text-primary transition-colors">
    <span class="material-symbols-outlined">confirmation_number</span>
    <span class="text-[10px] font-medium">Tickets</span>
  </a>
</nav>
<script src="./auth.js"></script>
<script src="./seat-service.js"></script>
<script>
  document.addEventListener('DOMContentLoaded', async () => {
    if (!authService.requireAuthorization(['manager', 'clerk'])) {
      return;
    }
    hideUnauthorizedLinks();

    const seatCount = document.getElementById('seat-count');
    const availableSeatCount = document.getElementById('available-seat-count');
    const loadedSeatCount = document.getElementById('loaded-seat-count');
    const seatTableBody = document.getElementById('seat-table-body');
    const initializeButton = document.getElementById('initialize-seats-button');

    const renderSeats = (seats) => {
      seatTableBody.innerHTML = seats.length
        ? seats.slice(0, 40).map((seat) => {
            const status = seat.ticket ? 'Booked' : 'Available';
            return `
              <tr class="hover:bg-surface-variant transition-colors">
                <td class="px-lg py-md font-medium text-on-surface">${seat.seat_row}${seat.seat_number}</td>
                <td class="px-lg py-md text-on-surface-variant">${seat.category}</td>
                <td class="px-lg py-md text-on-surface-variant">${status}</td>
              </tr>
            `;
          }).join('')
        : '<tr><td class="px-lg py-md text-on-surface" colspan="3">No seats loaded yet.</td></tr>';
    };

    const loadSeatData = async () => {
      const [allResult, availableResult] = await Promise.all([
        seatService.getSeats(),
        seatService.getAvailableSeats(),
      ]);

      if (!allResult.success) {
        showToast(allResult.error || 'Unable to load seats.', 'error');
        return;
      }
      if (!availableResult.success) {
        showToast(availableResult.error || 'Unable to load available seats.', 'error');
        return;
      }

      const allSeats = allResult.data || [];
      const availableSeats = availableResult.data || [];
      seatCount.textContent = allSeats.length;
      availableSeatCount.textContent = availableSeats.length;
      loadedSeatCount.textContent = allSeats.length;
      renderSeats(allSeats);
    };

    initializeButton?.addEventListener('click', async () => {
      const result = await seatService.initializeSeats();
      if (!result.success) {
        showToast(result.error || 'Unable to initialize seats.', 'error');
        return;
      }
      showToast(result.data?.message || 'Seats initialized.', 'success');
      await loadSeatData();
    });

    await loadSeatData();
  });
</script>
</body>
</html>
